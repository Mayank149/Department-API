services:
  api:
    build: .
    container_name: dept-api
    ports:
      - "8000:8000"
    depends_on:
      - db
  
  db:
    image: postgres:15
    container_name: dept-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRESS_DB: predictions_db
    ports:
      - "5432:5432"